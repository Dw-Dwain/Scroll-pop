# CodeQL — static application security testing (SAST) for JS/TS.
# Scans for injection, auth, and data-flow vulnerabilities on every PR/push to main and weekly.
# Results surface in the repo's Security tab. Maps to SOC 2 CC7.1 (vulnerability detection) and is
# auditor-recognized evidence of continuous code-security analysis.
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full scan (Mondays 07:00 UTC) so advisories in unchanged code are still caught.
    - cron: "0 7 * * 1"

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: javascript-typescript
          # security-extended adds more security queries than the default suite.
          queries: security-extended
          # Test files intentionally contain adversarial fixtures (e.g. ReDoS patterns fed to the
          # validator under test), which trip data-flow queries as false positives. Production code
          # is still fully scanned.
          config: |
            paths-ignore:
              - '**/*.test.ts'
              - '**/*.test.tsx'

      # No compiled build step needed for JS/TS — CodeQL analyzes source directly.
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          category: "/language:javascript-typescript"
