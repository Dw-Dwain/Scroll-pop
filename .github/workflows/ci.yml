name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '11.1.1'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test

  snippet-size-check:
    name: Snippet Size Check (≤ 10 KB gzipped)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter snippet build
      - name: Check gzipped bundle size
        run: |
          BUNDLE="packages/snippet/dist/p.js"
          if [ ! -f "$BUNDLE" ]; then
            echo "❌ Bundle not found at $BUNDLE"
            exit 1
          fi
          GZIP_SIZE=$(gzip -c "$BUNDLE" | wc -c)
          LIMIT=10240
          echo "Bundle gzipped size: ${GZIP_SIZE} bytes (limit: ${LIMIT})"
          if [ "$GZIP_SIZE" -gt "$LIMIT" ]; then
            echo "❌ FAIL: Bundle exceeds 10 KB gzipped limit (${GZIP_SIZE} > ${LIMIT})"
            exit 1
          fi
          echo "✅ PASS: Bundle is within size limit"

  no-history-manipulation:
    name: No history.* / popstate in snippet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for banned APIs in snippet source
        run: |
          BANNED_PATTERNS=(
            "history\.pushState"
            "history\.replaceState"
            "onpopstate"
            "addEventListener.*popstate"
            "back_button_capture"
          )
          SNIPPET_DIR="packages/snippet/src"
          FAILED=0
          for pattern in "${BANNED_PATTERNS[@]}"; do
            if grep -rE "$pattern" "$SNIPPET_DIR" 2>/dev/null; then
              echo "❌ BANNED API FOUND: $pattern"
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo "❌ FAIL: Snippet contains banned navigation manipulation APIs"
            echo "See CLAUDE.md rule #1 for details."
            exit 1
          fi
          echo "✅ PASS: No banned APIs found in snippet source"

  deploy-api:
    name: Deploy API → Render
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, snippet-size-check, no-history-manipulation]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render deploy hook
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
            echo "✅ Render deploy triggered"
          else
            echo "⚠️ RENDER_DEPLOY_HOOK_URL not set — Render auto-deploys on push"
          fi

  deploy-worker:
    name: Deploy Worker → Cloudflare
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, snippet-size-check, no-history-manipulation]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter snippet build
      - name: Debug CF token
        run: |
          echo "Token length: ${#CLOUDFLARE_API_TOKEN}"
          echo "Account ID length: ${#CLOUDFLARE_ACCOUNT_ID}"
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then echo "❌ TOKEN IS EMPTY"; else echo "✅ TOKEN IS SET"; fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy Worker
        working-directory: apps/worker
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "⏭️  CLOUDFLARE_API_TOKEN not set on this repo — skipping Worker deploy."
            echo "    (The Worker is deployed from the repo that holds the Cloudflare secrets.)"
            exit 0
          fi
          node -e "require('fs').copyFileSync('../../packages/snippet/dist/p.js', 'src/p.txt')"
          npx wrangler deploy --env=""
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
