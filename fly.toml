# Fly.io app config for the ScrollPop API (apps/api).
# App name + region are placeholders — `fly launch`/`fly apps create` will prompt for these,
# or edit them here before the first `fly deploy`.
app = "scrollpop-api"
primary_region = "ord"

[build]

[deploy]
  release_command = "pnpm --filter @scrollpop/api exec drizzle-kit migrate"

[env]
  NODE_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "15s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
