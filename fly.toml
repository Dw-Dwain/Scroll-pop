# Fly.io app config for the ScrollPop API (apps/api).
# App name + region are placeholders — `fly launch`/`fly apps create` will prompt for these,
# or edit them here before the first `fly deploy`.
app = "scrollpop-api"
primary_region = "ord"

[build]

# Migrations are NOT a release_command anymore: drizzle-kit migrate in a release machine hung
# holding a connection, so the machine never destroyed and every deploy aborted. They now run on
# app boot (advisory-locked + non-fatal — see apps/api/src/index.ts), so a slow/hung migration can
# never block a deployment.
[env]
  NODE_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "15s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
